<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Страница авторизации</title>
</head>
<body>
    <div id="root"></div>

    <!-- React и ReactDOM через CDN -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel для трансформации JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Компонент LoginPage -->
    <script type="text/babel">
        const { useState } = React;

        function LoginPage() {
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [error, setError] = useState('');
            const [isLoading, setIsLoading] = useState(false);
            const [focusedInput, setFocusedInput] = useState(null);
            const [isRegisterHovered, setIsRegisterHovered] = useState(false);

            const handleSubmit = async (e) => {
                e.preventDefault();
                setError('');

                // Валидация
                if (!email || !password) {
                    setError('Пожалуйста, заполните все поля');
                    return;
                }

                if (!email.includes('@')) {
                    setError('Введите корректный email адрес');
                    return;
                }

                setIsLoading(true);

                try {
                    // Здесь будет логика авторизации
                    // Например, вызов API
                    console.log('Авторизация:', { email, password });
                    
                    // Имитация запроса
                    await new Promise(resolve => setTimeout(resolve, 1000));
                    
                    alert('Авторизация успешна! (Это демо)');
                    
                } catch (err) {
                    setError('Ошибка авторизации. Проверьте данные и попробуйте снова.');
                } finally {
                    setIsLoading(false);
                }
            };

            const styles = {
                container: {
                    display: 'flex',
                    justifyContent: 'center',
                    alignItems: 'center',
                    minHeight: '100vh',
                    backgroundColor: '#f5f5f5',
                    padding: '20px',
                },
                loginBox: {
                    backgroundColor: '#ffffff',
                    borderRadius: '12px',
                    boxShadow: '0 4px 6px rgba(0, 0, 0, 0.1)',
                    padding: '40px',
                    width: '100%',
                    maxWidth: '400px',
                },
                title: {
                    fontSize: '28px',
                    fontWeight: '600',
                    color: '#333',
                    marginBottom: '30px',
                    textAlign: 'center',
                },
                form: {
                    display: 'flex',
                    flexDirection: 'column',
                    gap: '20px',
                },
                inputGroup: {
                    display: 'flex',
                    flexDirection: 'column',
                    gap: '8px',
                },
                label: {
                    fontSize: '14px',
                    fontWeight: '500',
                    color: '#555',
                },
                input: {
                    padding: '12px 16px',
                    fontSize: '16px',
                    border: '2px solid #e0e0e0',
                    borderRadius: '8px',
                    outline: 'none',
                    transition: 'border-color 0.3s',
                },
                inputFocus: {
                    borderColor: '#007bff',
                },
                button: {
                    padding: '14px',
                    fontSize: '16px',
                    fontWeight: '600',
                    color: '#ffffff',
                    backgroundColor: '#007bff',
                    border: 'none',
                    borderRadius: '8px',
                    cursor: 'pointer',
                    transition: 'background-color 0.3s',
                    marginTop: '10px',
                },
                buttonDisabled: {
                    backgroundColor: '#ccc',
                    cursor: 'not-allowed',
                },
                errorMessage: {
                    backgroundColor: '#fee',
                    color: '#c33',
                    padding: '12px',
                    borderRadius: '8px',
                    fontSize: '14px',
                    marginBottom: '20px',
                    border: '1px solid #fcc',
                },
                footer: {
                    marginTop: '20px',
                    textAlign: 'center',
                },
                link: {
                    color: '#007bff',
                    textDecoration: 'none',
                    fontSize: '14px',
                },
                buttonSecondary: {
                    padding: '14px',
                    fontSize: '16px',
                    fontWeight: '600',
                    color: '#007bff',
                    backgroundColor: 'transparent',
                    border: '2px solid #007bff',
                    borderRadius: '8px',
                    cursor: 'pointer',
                    transition: 'all 0.3s',
                    width: '100%',
                    marginTop: '10px',
                },
                footerButtons: {
                    display: 'flex',
                    flexDirection: 'column',
                    gap: '10px',
                    marginTop: '20px',
                },
            };

            return (
                <div style={styles.container}>
                    <div style={styles.loginBox}>
                        <h2 style={styles.title}>Вход в систему</h2>
                        
                        {error && (
                            <div style={styles.errorMessage}>
                                {error}
                            </div>
                        )}

                        <form onSubmit={handleSubmit} style={styles.form}>
                            <div style={styles.inputGroup}>
                                <label style={styles.label}>Email</label>
                                <input
                                    type="email"
                                    value={email}
                                    onChange={(e) => setEmail(e.target.value)}
                                    onFocus={() => setFocusedInput('email')}
                                    onBlur={() => setFocusedInput(null)}
                                    placeholder="your.email@example.com"
                                    style={{
                                        ...styles.input,
                                        ...(focusedInput === 'email' ? styles.inputFocus : {})
                                    }}
                                    disabled={isLoading}
                                />
                            </div>

                            <div style={styles.inputGroup}>
                                <label style={styles.label}>Пароль</label>
                                <input
                                    type="password"
                                    value={password}
                                    onChange={(e) => setPassword(e.target.value)}
                                    onFocus={() => setFocusedInput('password')}
                                    onBlur={() => setFocusedInput(null)}
                                    placeholder="Введите пароль"
                                    style={{
                                        ...styles.input,
                                        ...(focusedInput === 'password' ? styles.inputFocus : {})
                                    }}
                                    disabled={isLoading}
                                />
                            </div>

                            <button
                                type="submit"
                                style={{
                                    ...styles.button,
                                    ...(isLoading ? styles.buttonDisabled : {})
                                }}
                                disabled={isLoading}
                            >
                                {isLoading ? 'Вход...' : 'Войти'}
                            </button>
                        </form>

                        <div style={styles.footer}>
                            <a href="#" style={styles.link}>Забыли пароль?</a>
                        </div>

                        <div style={styles.footerButtons}>
                            <button
                                type="button"
                                onClick={() => window.location.href = 'register.html'}
                                onMouseEnter={() => setIsRegisterHovered(true)}
                                onMouseLeave={() => setIsRegisterHovered(false)}
                                style={{
                                    ...styles.buttonSecondary,
                                    ...(isRegisterHovered ? {
                                        backgroundColor: '#007bff',
                                        color: '#ffffff'
                                    } : {})
                                }}
                            >
                                Зарегистрироваться
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        // Рендеринг компонента
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<LoginPage />);
    </script>
</body>
</html>
