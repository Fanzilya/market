<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация</title>
</head>
<body>
    <div id="root"></div>

    <!-- React и ReactDOM через CDN -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel для трансформации JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Компонент RegisterPage -->
    <script type="text/babel">
        const { useState } = React;

        function RegisterPage() {
            const [name, setName] = useState('');
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [confirmPassword, setConfirmPassword] = useState('');
            const [error, setError] = useState('');
            const [success, setSuccess] = useState('');
            const [isLoading, setIsLoading] = useState(false);
            const [focusedInput, setFocusedInput] = useState(null);
            const [isLoginHovered, setIsLoginHovered] = useState(false);

            const handleSubmit = async (e) => {
                e.preventDefault();
                setError('');
                setSuccess('');

                // Валидация
                if (!name || !email || !password || !confirmPassword) {
                    setError('Пожалуйста, заполните все поля');
                    return;
                }

                if (name.length < 2) {
                    setError('Имя должно содержать минимум 2 символа');
                    return;
                }

                if (!email.includes('@') || !email.includes('.')) {
                    setError('Введите корректный email адрес');
                    return;
                }

                if (password.length < 6) {
                    setError('Пароль должен содержать минимум 6 символов');
                    return;
                }

                if (password !== confirmPassword) {
                    setError('Пароли не совпадают');
                    return;
                }

                setIsLoading(true);

                try {
                    // Здесь будет логика регистрации
                    // Например, вызов API
                    console.log('Регистрация:', { name, email, password });
                    
                    // Имитация запроса
                    await new Promise(resolve => setTimeout(resolve, 1500));
                    
                    setSuccess('Регистрация успешна! Вы будете перенаправлены на страницу входа...');
                    
                    // Перенаправление на страницу входа через 2 секунды
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 2000);
                    
                } catch (err) {
                    setError('Ошибка регистрации. Попробуйте снова.');
                } finally {
                    setIsLoading(false);
                }
            };

            const styles = {
                container: {
                    display: 'flex',
                    justifyContent: 'center',
                    alignItems: 'center',
                    minHeight: '100vh',
                    backgroundColor: '#f5f5f5',
                    padding: '20px',
                },
                registerBox: {
                    backgroundColor: '#ffffff',
                    borderRadius: '12px',
                    boxShadow: '0 4px 6px rgba(0, 0, 0, 0.1)',
                    padding: '40px',
                    width: '100%',
                    maxWidth: '450px',
                },
                title: {
                    fontSize: '28px',
                    fontWeight: '600',
                    color: '#333',
                    marginBottom: '30px',
                    textAlign: 'center',
                },
                form: {
                    display: 'flex',
                    flexDirection: 'column',
                    gap: '20px',
                },
                inputGroup: {
                    display: 'flex',
                    flexDirection: 'column',
                    gap: '8px',
                },
                label: {
                    fontSize: '14px',
                    fontWeight: '500',
                    color: '#555',
                },
                input: {
                    padding: '12px 16px',
                    fontSize: '16px',
                    border: '2px solid #e0e0e0',
                    borderRadius: '8px',
                    outline: 'none',
                    transition: 'border-color 0.3s',
                },
                inputFocus: {
                    borderColor: '#007bff',
                },
                button: {
                    padding: '14px',
                    fontSize: '16px',
                    fontWeight: '600',
                    color: '#ffffff',
                    backgroundColor: '#007bff',
                    border: 'none',
                    borderRadius: '8px',
                    cursor: 'pointer',
                    transition: 'background-color 0.3s',
                    marginTop: '10px',
                },
                buttonDisabled: {
                    backgroundColor: '#ccc',
                    cursor: 'not-allowed',
                },
                errorMessage: {
                    backgroundColor: '#fee',
                    color: '#c33',
                    padding: '12px',
                    borderRadius: '8px',
                    fontSize: '14px',
                    marginBottom: '20px',
                    border: '1px solid #fcc',
                },
                successMessage: {
                    backgroundColor: '#efe',
                    color: '#3c3',
                    padding: '12px',
                    borderRadius: '8px',
                    fontSize: '14px',
                    marginBottom: '20px',
                    border: '1px solid #cfc',
                },
                footer: {
                    marginTop: '20px',
                    textAlign: 'center',
                },
                link: {
                    color: '#007bff',
                    textDecoration: 'none',
                    fontSize: '14px',
                },
                buttonSecondary: {
                    padding: '14px',
                    fontSize: '16px',
                    fontWeight: '600',
                    color: '#007bff',
                    backgroundColor: 'transparent',
                    border: '2px solid #007bff',
                    borderRadius: '8px',
                    cursor: 'pointer',
                    transition: 'all 0.3s',
                    width: '100%',
                    marginTop: '10px',
                },
                footerButtons: {
                    display: 'flex',
                    flexDirection: 'column',
                    gap: '10px',
                    marginTop: '20px',
                },
            };

            return (
                <div style={styles.container}>
                    <div style={styles.registerBox}>
                        <h2 style={styles.title}>Регистрация</h2>
                        
                        {error && (
                            <div style={styles.errorMessage}>
                                {error}
                            </div>
                        )}

                        {success && (
                            <div style={styles.successMessage}>
                                {success}
                            </div>
                        )}

                        <form onSubmit={handleSubmit} style={styles.form}>
                            <div style={styles.inputGroup}>
                                <label style={styles.label}>Имя</label>
                                <input
                                    type="text"
                                    value={name}
                                    onChange={(e) => setName(e.target.value)}
                                    onFocus={() => setFocusedInput('name')}
                                    onBlur={() => setFocusedInput(null)}
                                    placeholder="Введите ваше имя"
                                    style={{
                                        ...styles.input,
                                        ...(focusedInput === 'name' ? styles.inputFocus : {})
                                    }}
                                    disabled={isLoading}
                                />
                            </div>

                            <div style={styles.inputGroup}>
                                <label style={styles.label}>Email</label>
                                <input
                                    type="email"
                                    value={email}
                                    onChange={(e) => setEmail(e.target.value)}
                                    onFocus={() => setFocusedInput('email')}
                                    onBlur={() => setFocusedInput(null)}
                                    placeholder="your.email@example.com"
                                    style={{
                                        ...styles.input,
                                        ...(focusedInput === 'email' ? styles.inputFocus : {})
                                    }}
                                    disabled={isLoading}
                                />
                            </div>

                            <div style={styles.inputGroup}>
                                <label style={styles.label}>Пароль</label>
                                <input
                                    type="password"
                                    value={password}
                                    onChange={(e) => setPassword(e.target.value)}
                                    onFocus={() => setFocusedInput('password')}
                                    onBlur={() => setFocusedInput(null)}
                                    placeholder="Минимум 6 символов"
                                    style={{
                                        ...styles.input,
                                        ...(focusedInput === 'password' ? styles.inputFocus : {})
                                    }}
                                    disabled={isLoading}
                                />
                            </div>

                            <div style={styles.inputGroup}>
                                <label style={styles.label}>Подтвердите пароль</label>
                                <input
                                    type="password"
                                    value={confirmPassword}
                                    onChange={(e) => setConfirmPassword(e.target.value)}
                                    onFocus={() => setFocusedInput('confirmPassword')}
                                    onBlur={() => setFocusedInput(null)}
                                    placeholder="Повторите пароль"
                                    style={{
                                        ...styles.input,
                                        ...(focusedInput === 'confirmPassword' ? styles.inputFocus : {})
                                    }}
                                    disabled={isLoading}
                                />
                            </div>

                            <button
                                type="submit"
                                style={{
                                    ...styles.button,
                                    ...(isLoading ? styles.buttonDisabled : {})
                                }}
                                disabled={isLoading}
                            >
                                {isLoading ? 'Регистрация...' : 'Зарегистрироваться'}
                            </button>
                        </form>

                        <div style={styles.footer}>
                            <span style={{ color: '#666', fontSize: '14px' }}>
                                Уже есть аккаунт?{' '}
                            </span>
                        </div>

                        <div style={styles.footerButtons}>
                            <button
                                type="button"
                                onClick={() => window.location.href = 'index.html'}
                                onMouseEnter={() => setIsLoginHovered(true)}
                                onMouseLeave={() => setIsLoginHovered(false)}
                                style={{
                                    ...styles.buttonSecondary,
                                    ...(isLoginHovered ? {
                                        backgroundColor: '#007bff',
                                        color: '#ffffff'
                                    } : {})
                                }}
                            >
                                Войти
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        // Рендеринг компонента
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<RegisterPage />);
    </script>
</body>
</html>
